name: trivy
on:
  push:
    branches: ["main"]
  pull_request:
permissions:
  contents: read
  security-events: write
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Trivy filesystem scan (deps + secrets + misconfig)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          skip-dirs: tests,docs
          format: sarif
          output: trivy.sarif
          # Report-only: surface findings in the Security tab; don't gate PRs.
          # Flip to 1 later to fail on fixable CRITICAL/HIGH.
          exit-code: "0"
      - name: Upload results to the Security tab
        # Fork PRs aren't granted `security-events: write`, so only upload on
        # pushes and same-repo PRs (avoids a red workflow for outside contributors).
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
